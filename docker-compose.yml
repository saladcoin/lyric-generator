version: "3.8"

services:
  backend:
    build: ./backend
    container_name: lyric-backend
    ports:
      - "8000:8000"
    environment:
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - LLM_API_BASE=https://open.bigmodel.cn/api/paas/v4
      - LLM_MODEL=glm-4v-plus-0111
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: lyric-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
